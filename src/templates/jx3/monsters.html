<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: Harmony;
            src: url("{{ font }}");
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 18px;
            color: #27313c;
            background: #eef2f5;
            font-family: Harmony, "Microsoft YaHei", sans-serif;
        }

        .m-bmap {
            width: 790px;
            padding: 22px 24px 16px;
            overflow: hidden;
            border: 1px solid #e3e8ec;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 6px 20px rgba(43, 59, 72, .08);
        }

        .map-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 4px 14px;
            border-bottom: 1px solid #edf0f2;
        }

        .map-title {
            font-size: 25px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #263746;
        }

        .map-subtitle {
            margin-top: 5px;
            font-size: 12px;
            color: #99a4ad;
            letter-spacing: .5px;
        }

        .u-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin: 0 auto;
        }

        .u-row {
            position: relative;
            display: flex;
            gap: 10px;
            height: 72px;
        }

        .u-row:nth-of-type(2n) { flex-direction: row-reverse; }

        .u-column {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 64px;
        }

        .u-column::after {
            position: absolute;
            top: 20px;
            right: -10px;
            width: 10px;
            height: 2px;
            content: "";
            background: #d8dee3;
        }

        .u-column:last-child::after { display: none; }

        .u-img {
            position: relative;
            z-index: 2;
            width: 42px;
            height: 42px;
            overflow: hidden;
            border: 3px solid #e6eaed;
            border-radius: 50%;
            background: #f4f6f7;
            box-shadow: 0 2px 5px rgba(35, 47, 56, .12);
        }

        .u-img img { width: 100%; height: 100%; object-fit: cover; }

        .is-effect .u-img {
            border-color: #d9b979;
            box-shadow: 0 2px 7px rgba(169, 119, 42, .24);
        }

        .u-index {
            position: absolute;
            z-index: 3;
            top: 29px;
            left: 37px;
            min-width: 19px;
            height: 19px;
            padding: 0 4px;
            border: 2px solid #fff;
            border-radius: 10px;
            background: #6e7b85;
            color: #fff;
            text-align: center;
            font: 10px/15px Harmony, sans-serif;
        }

        .is-effect .u-index { background: #ad7c35; }

        .u-name {
            max-width: 66px;
            margin-top: 5px;
            overflow: hidden;
            color: #3c4953;
            font-size: 12px;
            line-height: 16px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .u-gift {
            position: absolute;
            top: 61px;
            z-index: 4;
            width: 94px;
            color: #8d5f22;
            font-size: 9px;
            text-align: center;
            white-space: nowrap;
        }

        .u-coin { margin-left: 3px; color: #d56f35; }

        .u-elite {
            display: none;
            position: absolute;
            z-index: 1;
            top: -3px;
            width: 48px;
            height: 48px;
            border: 1px solid #b99463;
            border-radius: 10px;
            background: #f4e8d6;
            transform: rotate(45deg);
        }

        .is-elite .u-elite { display: block; }
        .is-elite .u-img { border-color: #9c7144; }

        .copyright {
            margin-top: 22px;
            padding-top: 13px;
            border-top: 1px solid #edf0f2;
            color: #98a2aa;
            font-size: 11px;
            line-height: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="m-bmap is-map-phone">
        <header class="map-header">
            <div>
                <div class="map-title">百战异闻录</div>
                <div class="map-subtitle">本周首领与关卡效果路线</div>
            </div>
        </header>
        <section class="u-list">{{ table_content }}</section>
        <footer class="copyright">Inkar Suki · {{ application_name }}</footer>
    </main>
</body>
</html>
